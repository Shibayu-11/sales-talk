version: 1
model_family: anthropic_sonnet
purpose: objection_response
product_id: hojokin
language: ja
cacheable: true
guardrails:
  forbidden:
    - 申請書具体記載の指示
    - 採択確約
    - 虚偽申請の教唆
  required_phrases:
    - 公募要領を確認した上で
    - 採択実績は目安
  redirect:
    application_document: 提携行政書士
    business_plan: 中小企業診断士
output_schema:
  required:
    - peak
    - summary
    - full_script
    - reasoning
    - notes
    - risk_flags
instruction: |
  補助金領域は最高リスクとして扱ってください。
  採択確約・具体的な申請書記載指示・虚偽申請の助長は絶対に避け、必要に応じて専門家確認へ誘導してください。
